<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>

    <radialGradient id="bgGrad" cx="40%" cy="30%" r="75%">
      <stop offset="0%"   stop-color="#1e2230"/>
      <stop offset="100%" stop-color="#0e1018"/>
    </radialGradient>

    <radialGradient id="planetGrad" cx="42%" cy="36%" r="65%">
      <stop offset="0%"   stop-color="#8fa0b8"/>
      <stop offset="55%"  stop-color="#6b7d95"/>
      <stop offset="100%" stop-color="#4d5e77"/>
    </radialGradient>

    <radialGradient id="planetEdge" cx="50%" cy="50%" r="50%">
      <stop offset="78%"  stop-color="transparent"/>
      <stop offset="100%" stop-color="#1a1e2a" stop-opacity="0.45"/>
    </radialGradient>

    <clipPath id="pc">
      <circle cx="256" cy="256" r="155"/>
    </clipPath>

    <filter id="moonGlow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="11" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="textGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- Background — app icon shape -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bgGrad)"/>

  <!-- Planet body -->
  <circle cx="256" cy="256" r="155" fill="url(#planetGrad)"/>

  <!-- Surface markings -->
  <g clip-path="url(#pc)" fill="#1e2838" opacity="0.13">
    <ellipse cx="228" cy="315" rx="58" ry="38" transform="rotate(-20 228 315)"/>
    <ellipse cx="298" cy="198" rx="44" ry="28" transform="rotate(10 298 198)"/>
    <ellipse cx="182" cy="244" rx="30" ry="19" transform="rotate(-8 182 244)"/>
    <ellipse cx="318" cy="298" rx="34" ry="22" transform="rotate(15 318 298)"/>
    <ellipse cx="252" cy="346" rx="22" ry="13"/>
  </g>

  <!-- Edge darkening -->
  <circle cx="256" cy="256" r="155" fill="url(#planetEdge)"/>

  <!-- Orbit ring -->
  <ellipse cx="256" cy="256" rx="214" ry="192"
           fill="none" stroke="#a0a0a0" stroke-width="1.4" opacity="0.5"
           transform="rotate(-13 256 256)"/>

  <!-- Moon 1 — top right -->
  <circle cx="374" cy="154" r="17" fill="#f3edd8" filter="url(#moonGlow)"/>

  <!-- Moon 2 — bottom left -->
  <circle cx="141" cy="360" r="17" fill="#f3edd8" filter="url(#moonGlow)"/>

  <!-- LM — stroked paths, no font -->
  <g stroke="#f3edd8" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"
     fill="none" filter="url(#textGlow)">
    <polyline points="205,220 205,295 244,295"/>
    <polyline points="263,295 263,220 285,257 307,220 307,295"/>
  </g>

  <!-- 4-pointed star, bottom right -->
  <path d="M402,410 L405,402 L408,410 L416,413 L408,416 L405,424 L402,416 L394,413 Z"
        fill="#5a5d6e" opacity="0.9"/>

</svg>
